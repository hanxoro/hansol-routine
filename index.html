<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="한솔 루틴" />
  <meta name="theme-color" content="#111318" />
  <title>한솔 루틴</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #111318; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TODAY = () => new Date().toDateString();
    const TIMER_TOTAL = 45 * 60;

    function thisMonthCount(weekData) {
      const now = new Date();
      return Object.entries(weekData).filter(([k, v]) => {
        const d = new Date(k);
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && v >= 1;
      }).length;
    }

    const MOODS = [
      { emoji: "😵", color: "#EF4444", tip: "쉬는 날 모드로 가." },
      { emoji: "😟", color: "#F97316", tip: "1블록만 앉아봐." },
      { emoji: "😐", color: "#EAB308", tip: "평소대로 가면 돼." },
      { emoji: "🙂", color: "#22C55E", tip: "2블록 목표." },
      { emoji: "⚡", color: "#C9A96E", tip: "오버페이스 조심." },
    ];

    const QUESTIONS = [
      "지금 쓰는 이야기에서 제일 보고 싶은 장면은?",
      "주인공이 제일 두려워하는 게 뭐야?",
      "이 이야기 끝나고 남는 감정이 뭐였으면 해?",
      "막힌 씬, 네가 그 인물이라면 뭐라고 했을 것 같아?",
      "처음 떠올렸을 때 머릿속에 있던 이미지가 뭐야?",
      "지금 인물이 말 못 하고 있는 게 뭐야?",
      "이 장면 다음에 뭐가 오면 가장 충격적일 것 같아?",
      "이 이야기에서 가장 솔직한 순간은 어디야?",
      "지금 이 이야기를 왜 쓰고 싶었는지 한 줄로 말할 수 있어?",
    ];

    const BLOCKS = [
      { title: "1블록", sub: "레퍼런스 · 인풋", hint: "보고 느끼는 것부터" },
      { title: "2블록", sub: "장면 · 메모", hint: "완성 목표 아님" },
      { title: "3블록", sub: "정리 · 공유", hint: "누군가에게 보여주기" },
    ];

    const PROOF_ITEMS = [
      { key: "openedDoc", label: "문서를 열었다" },
      { key: "wroteLine", label: "한 줄 썼다" },
      { key: "sharedIdea", label: "누군가에게 얘기했다" },
    ];

    function loadLocal(key, fallback) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
      catch { return fallback; }
    }
    function saveLocal(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    const defDay = () => ({
      dateKey: TODAY(), mood: null, interest: null,
      todayCurious: "", todayDropped: "",
      blocks: [false, false, false],
      timerElapsed: [0, 0, 0], timerRunning: [false, false, false],
      restMode: false, restChecks: [false, false],
      proofs: { openedDoc: false, wroteLine: false, sharedIdea: false },
      sessionCount: 0, ideas: [],
    });
    const defMeta = () => ({ streak: 0, lastSuccess: "", weekData: {} });

    function Ring({ elapsed, running }) {
      const rem = Math.max(0, TIMER_TOTAL - elapsed);
      const pct = Math.min(elapsed / TIMER_TOTAL, 1);
      const r = 22, circ = 2 * Math.PI * r;
      const m = String(Math.floor(rem / 60)).padStart(2, "0");
      const s = String(rem % 60).padStart(2, "0");
      return (
        <div style={{ position: "relative", width: 52, height: 52, flexShrink: 0 }}>
          <svg width="52" height="52" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="26" cy="26" r={r} fill="none" stroke="#2A2D36" strokeWidth="4" />
            <circle cx="26" cy="26" r={r} fill="none"
              stroke={running ? "#C9A96E" : "#3A3D46"} strokeWidth="4"
              strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
              style={{ transition: "stroke-dashoffset 1s linear" }} />
          </svg>
          <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", fontSize: 10, fontWeight: 700, color: "#D1CEC8" }}>
            {m}:{s}
          </div>
        </div>
      );
    }

    function WeekDots({ weekData }) {
      const today = new Date();
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(today); d.setDate(today.getDate() - (6 - i));
        const key = d.toDateString();
        return { key, count: weekData[key] || 0, isToday: i === 6, label: ["일","월","화","수","목","금","토"][d.getDay()] };
      });
      return (
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          {days.map(({ key, count, isToday, label }) => (
            <div key={key} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <div style={{
                width: 32, height: 32, borderRadius: "50%",
                background: count >= 3 ? "#C9A96E" : count === 2 ? "#C9A96E66" : count === 1 ? "#C9A96E33" : "#1C1F27",
                border: isToday ? "2px solid #C9A96E" : "2px solid #2A2D36",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 11, color: "#F0EDE8", fontWeight: 600,
              }}>{count > 0 ? count : ""}</div>
              <div style={{ fontSize: 10, color: isToday ? "#C9A96E" : "#4B5563" }}>{label}</div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [day, setDay] = useState(() => {
        const sd = loadLocal("day_v3", null);
        return sd && sd.dateKey === TODAY() ? sd : defDay();
      });
      const [meta, setMeta] = useState(() => loadLocal("meta_v3", defMeta()));
      const [tab, setTab] = useState("routine");
      const [qIdx, setQIdx] = useState(0);
      const [ideaInput, setIdeaInput] = useState("");

      useEffect(() => { saveLocal("day_v3", day); }, [day]);

      useEffect(() => {
        setMeta(prev => {
          const weekData = { ...prev.weekData, [TODAY()]: day.sessionCount };
          let { streak, lastSuccess } = prev;
          if (day.sessionCount >= 1 && lastSuccess !== TODAY()) {
            const yest = new Date(); yest.setDate(yest.getDate() - 1);
            streak = lastSuccess === yest.toDateString() ? streak + 1 : 1;
            lastSuccess = TODAY();
          }
          const next = { streak, lastSuccess, weekData };
          saveLocal("meta_v3", next);
          return next;
        });
      }, [day.sessionCount]);

      useEffect(() => {
        const idx = day.timerRunning.findIndex(Boolean);
        if (idx === -1) return;
        const id = setInterval(() => {
          setDay(prev => {
            const elapsed = [...prev.timerElapsed];
            elapsed[idx]++;
            if (elapsed[idx] >= TIMER_TOTAL) {
              const blocks = [...prev.blocks];
              const timers = [...prev.timerRunning];
              timers[idx] = false;
              if (!blocks[idx]) {
                blocks[idx] = true;
                return { ...prev, timerElapsed: elapsed, timerRunning: timers, blocks, sessionCount: prev.sessionCount + 1 };
              }
              return { ...prev, timerElapsed: elapsed, timerRunning: timers };
            }
            return { ...prev, timerElapsed: elapsed };
          });
        }, 1000);
        return () => clearInterval(id);
      }, [day.timerRunning]);

      const upd = patch => setDay(prev => ({ ...prev, ...patch }));

      const toggleBlock = i => {
        const blocks = [...day.blocks], timers = [...day.timerRunning];
        if (!blocks[i]) { blocks[i] = true; timers[i] = false; upd({ blocks, timerRunning: timers, sessionCount: day.sessionCount + 1 }); }
        else { blocks[i] = false; upd({ blocks, sessionCount: Math.max(0, day.sessionCount - 1) }); }
      };
      const toggleTimer = i => upd({ timerRunning: day.timerRunning.map((v, idx) => idx === i ? !v : false) });
      const toggleProof = key => upd({ proofs: { ...day.proofs, [key]: !day.proofs[key] } });
      const addIdea = () => {
        if (!ideaInput.trim()) return;
        upd({ ideas: [...day.ideas, { id: Date.now(), text: ideaInput.trim(), time: new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" }) }]});
        setIdeaInput("");
      };

      const docOpened = day.proofs.openedDoc;
      const S = {
        root: { minHeight: "100svh", background: "#111318", display: "flex", justifyContent: "center", padding: "48px 16px 48px", fontFamily: "'Apple SD Gothic Neo','Noto Sans KR',sans-serif" },
        wrap: { width: "100%", maxWidth: 420, display: "flex", flexDirection: "column", gap: 14 },
        h1: { fontSize: 26, fontWeight: 700, color: "#F0EDE8", margin: 0, letterSpacing: "-0.02em" },
        badge: { fontSize: 12, color: "#C9A96E", background: "#C9A96E22", border: "1px solid #C9A96E44", borderRadius: 20, padding: "3px 10px" },
        hero: { background: "#1C1F27", borderRadius: 20, padding: "28px 20px", border: "2px solid #C9A96E44", textAlign: "center", cursor: "pointer" },
        heroDone: { background: "#1A2820", border: "2px solid #3D6B4F" },
        card: { background: "#1C1F27", borderRadius: 16, padding: 20, border: "1px solid #2A2D36" },
        label: { fontSize: 11, fontWeight: 600, color: "#C9A96E", letterSpacing: "0.08em", marginBottom: 14, textTransform: "uppercase" },
        tab: { flex: 1, background: "#1C1F27", border: "1px solid #2A2D36", borderRadius: 10, padding: 12, color: "#6B7280", fontSize: 13, cursor: "pointer", fontFamily: "inherit" },
        tabOn: { background: "#C9A96E", border: "1px solid #C9A96E", color: "#111318", fontWeight: 600 },
        input: { width: "100%", background: "#111318", border: "1px solid #2A2D36", borderRadius: 10, padding: "12px 14px", color: "#F0EDE8", fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "inherit" },
        block: { background: "#111318", borderRadius: 10, border: "1px solid #2A2D36", overflow: "hidden" },
        blockDone: { background: "#1A2820", border: "1px solid #3D6B4F" },
        chk: { width: 22, height: 22, borderRadius: 6, background: "#1C1F27", border: "1px solid #3A3D46", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#7BC67E", flexShrink: 0, cursor: "pointer" },
        timerBtn: { flex: 1, background: "#1C1F27", border: "1px solid #2A2D36", borderRadius: 8, padding: "8px 12px", color: "#9CA3AF", fontSize: 12, cursor: "pointer", fontFamily: "inherit" },
        timerBtnOn: { background: "#C9A96E22", border: "1px solid #C9A96E44", color: "#C9A96E" },
        doneBtn: { background: "#1C1F27", border: "1px solid #2A2D36", borderRadius: 8, padding: "8px 16px", color: "#6B7280", fontSize: 12, cursor: "pointer", fontFamily: "inherit" },
      };

      return (
        <div style={S.root}>
          <div style={S.wrap}>
            <div style={{ padding: "0 0 4px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: "#6B7280" }}>{new Date().toLocaleDateString("ko-KR", { month: "long", day: "numeric", weekday: "short" })}</div>
                <div style={S.badge}>📅 이번 달 {thisMonthCount(meta.weekData)}일</div>
              </div>
              <h1 style={S.h1}>오늘의 작업</h1>
            </div>

            <div style={{ display: "flex", gap: 8 }}>
              {[["routine","루틴"],["ideas","아이디어"],["week","이번 주"]].map(([k,l]) => (
                <button key={k} style={{ ...S.tab, ...(tab===k ? S.tabOn : {}) }} onClick={() => setTab(k)}>{l}</button>
              ))}
            </div>

            {tab === "routine" && <>
              <div style={{ ...S.hero, ...(docOpened ? S.heroDone : {}) }} onClick={() => toggleProof("openedDoc")}>
                <div style={{ fontSize: 30, marginBottom: 8 }}>{docOpened ? "✓" : "📄"}</div>
                <div style={{ fontSize: 17, fontWeight: 700, color: docOpened ? "#7BC67E" : "#F0EDE8", marginBottom: 4 }}>{docOpened ? "문서 열었어" : "문서를 열자"}</div>
                <div style={{ fontSize: 12, color: "#6B7280" }}>{docOpened ? "오늘의 시작 완료" : "이것만 해도 오늘은 성공이야"}</div>
              </div>

              <div style={S.card}>
                <div style={S.label}>시작 전</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                  {MOODS.map((m, i) => (
                    <button key={i} onClick={() => upd({ mood: i })}
                      style={{ flex: 1, background: day.mood===i ? m.color+"22" : "#111318", border: `2px solid ${day.mood===i ? m.color : "#2A2D36"}`, borderRadius: 10, padding: "10px 4px", cursor: "pointer" }}>
                      <div style={{ fontSize: 20, textAlign: "center" }}>{m.emoji}</div>
                    </button>
                  ))}
                </div>
                {day.mood !== null && <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 16, padding: "8px 12px", background: "#111318", borderRadius: 8 }}>{MOODS[day.mood].tip}</div>}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 8 }}>흥미도</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {[1,2,3,4,5].map(n => (
                      <button key={n} onClick={() => upd({ interest: n })}
                        style={{ flex: 1, height: 38, borderRadius: 8, border: "none", background: day.interest === n ? "#C9A96E" : day.interest > n ? "#C9A96E22" : "#111318", color: day.interest === n ? "#111318" : "#9CA3AF", fontSize: 14, fontWeight: 700, cursor: "pointer", outline: day.interest === n ? "none" : "1px solid #2A2D36" }}>
                        {n}
                      </button>
                    ))}
                  </div>
                  {day.interest !== null && <div style={{ fontSize: 12, color: "#6B7280", marginTop: 8 }}>{day.interest <= 2 ? "레퍼런스 보는 날이야." : day.interest === 3 ? "1블록만 써봐." : "좋아. 집필 먼저 가."}</div>}
                </div>
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 6 }}>오늘 가장 궁금한 것</div>
                  <input style={S.input} placeholder="예: 이 장면이 왜 심심하지?" value={day.todayCurious} onChange={e => upd({ todayCurious: e.target.value })} />
                  <div style={{ fontSize: 11, color: "#4B5563", marginTop: 6 }}>목표보다 질문이 먼저야.</div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 6 }}>오늘 안 하기로 한 것</div>
                  <input style={S.input} placeholder="예: 새 기획안 시작 안 하기" value={day.todayDropped} onChange={e => upd({ todayDropped: e.target.value })} />
                  <div style={{ fontSize: 11, color: "#4B5563", marginTop: 6 }}>하나를 버려야 하나를 할 수 있어.</div>
                </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {[["작업하는 날", false],["하고 싶지 않은 날", true]].map(([l,v]) => (
                  <button key={l} style={{ ...S.tab, ...(day.restMode===v ? S.tabOn : {}) }} onClick={() => upd({ restMode: v })}>{l}</button>
                ))}
              </div>

              {!day.restMode && <div style={S.card}>
                <div style={S.label}>작업 블록 · 45분</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {BLOCKS.map((b, i) => (
                    <div key={i} style={{ ...S.block, ...(day.blocks[i] ? S.blockDone : {}) }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: 14 }}>
                        <div style={S.chk} onClick={() => toggleBlock(i)}>{day.blocks[i] ? "✓" : ""}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, color: "#D1CEC8", fontWeight: 500 }}>{b.title} · {b.sub}</div>
                          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 2 }}>{b.hint}</div>
                        </div>
                        {!day.blocks[i] && <Ring elapsed={day.timerElapsed[i]} running={day.timerRunning[i]} />}
                      </div>
                      {!day.blocks[i] && (
                        <div style={{ padding: "0 14px 12px", display: "flex", gap: 8 }}>
                          <button style={{ ...S.timerBtn, ...(day.timerRunning[i] ? S.timerBtnOn : {}) }} onClick={() => toggleTimer(i)}>
                            {day.timerRunning[i] ? "⏸ 일시정지" : day.timerElapsed[i] > 0 ? "▶ 계속" : "▶ 시작"}
                          </button>
                          <button style={S.doneBtn} onClick={() => toggleBlock(i)}>완료</button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: "#6B7280", textAlign: "center", marginTop: 12 }}>3블록 이상은 오버야.</div>
              </div>}

              {day.restMode && <div style={S.card}>
                <div style={S.label}>오늘의 작업 · 쉬는 버전</div>
                {["좋아하는 드라마 · 영화 1편 봤다", '"이 장면 왜 좋지?" 메모 남겼다'].map((item, i) => (
                  <div key={i} style={{ ...S.block, ...(day.restChecks[i] ? S.blockDone : {}), marginBottom: i === 0 ? 8 : 0 }}
                    onClick={() => { const r=[...day.restChecks]; r[i]=!r[i]; upd({ restChecks: r }); }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: 14 }}>
                      <div style={S.chk}>{day.restChecks[i] ? "✓" : ""}</div>
                      <div style={{ fontSize: 14, color: "#D1CEC8" }}>{item}</div>
                    </div>
                  </div>
                ))}
                <div style={{ fontSize: 12, color: "#6B7280", textAlign: "center", marginTop: 12 }}>이것도 작업이야.</div>
              </div>}

              <div style={S.card}>
                <div style={S.label}>막힐 때</div>
                <div style={{ background: "#111318", borderRadius: 10, padding: 16, border: "1px solid #2A2D36", marginBottom: 10 }}>
                  <div style={{ fontSize: 14, color: "#D1CEC8", lineHeight: 1.7 }}>"{QUESTIONS[qIdx]}"</div>
                </div>
                <button style={{ background: "none", border: "none", color: "#C9A96E", fontSize: 13, cursor: "pointer", fontFamily: "inherit", padding: 0 }}
                  onClick={() => setQIdx(i => (i + 1) % QUESTIONS.length)}>다른 질문 →</button>
              </div>

              <div style={S.card}>
                <div style={S.label}>오늘의 증거</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {PROOF_ITEMS.map(({ key, label }) => (
                    <div key={key} style={{ ...S.block, ...(day.proofs[key] ? S.blockDone : {}) }} onClick={() => toggleProof(key)}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px" }}>
                        <div style={S.chk}>{day.proofs[key] ? "✓" : ""}</div>
                        <div style={{ fontSize: 14, color: "#D1CEC8" }}>{label}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: "#6B7280", marginTop: 10 }}>작은 것도 작업의 증거야.</div>
              </div>

              <div style={{ textAlign: "center", padding: 16, fontSize: 14, color: "#6B7280" }}>
                한솔아 넌 오늘도 창작자야. 잘 썼든 못 썼든.
              </div>
            </>}

            {tab === "ideas" && <>
              <div style={S.card}>
                <div style={S.label}>지금 떠오른 거</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <input style={{ ...S.input, flex: 1 }} placeholder="장면, 대사, 감정, 뭐든지" value={ideaInput} onChange={e => setIdeaInput(e.target.value)} onKeyDown={e => e.key === "Enter" && addIdea()} />
                  <button style={{ background: "#C9A96E", border: "none", borderRadius: 10, padding: "0 18px", color: "#111318", fontSize: 22, cursor: "pointer", fontWeight: 700 }} onClick={addIdea}>+</button>
                </div>
                <div style={{ fontSize: 11, color: "#4B5563", marginTop: 8 }}>완성 안 해도 돼. 일단 남겨.</div>
              </div>
              <div style={S.card}>
                <div style={S.label}>오늘 메모 ({day.ideas.length})</div>
                {day.ideas.length === 0
                  ? <div style={{ fontSize: 13, color: "#4B5563", textAlign: "center", padding: "20px 0" }}>아직 없어.</div>
                  : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {day.ideas.map(idea => (
                        <div key={idea.id} style={{ display: "flex", alignItems: "center", gap: 8, background: "#111318", borderRadius: 10, padding: "12px 14px", border: "1px solid #2A2D36" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 14, color: "#D1CEC8", lineHeight: 1.5 }}>{idea.text}</div>
                            <div style={{ fontSize: 11, color: "#4B5563", marginTop: 2 }}>{idea.time}</div>
                          </div>
                          <button style={{ background: "none", border: "none", color: "#4B5563", fontSize: 18, cursor: "pointer" }}
                            onClick={() => upd({ ideas: day.ideas.filter(id => id.id !== idea.id) })}>×</button>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </>}

            {tab === "week" && <>
              <div style={S.card}>
                <div style={S.label}>이번 주</div>
                <WeekDots weekData={meta.weekData} />
                <div style={{ display: "flex", gap: 12, marginTop: 12, fontSize: 11, color: "#4B5563" }}>
                  {[["없음","#1C1F27"],["1회","#C9A96E33"],["2회","#C9A96E66"],["3회+","#C9A96E"]].map(([l,bg]) => (
                    <span key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ display: "inline-block", width: 10, height: 10, borderRadius: "50%", background: bg, border: "1px solid #2A2D36" }} />{l}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div style={{ ...S.card, textAlign: "center" }}>
                  <div style={{ fontSize: 48, fontWeight: 700, color: "#F0EDE8", lineHeight: 1, padding: "8px 0" }}>{thisMonthCount(meta.weekData)}</div>
                  <div style={{ fontSize: 11, color: "#6B7280" }}>이번 달 돌아온 날</div>
                  <div style={{ fontSize: 11, color: "#4B5563", marginTop: 6 }}>
                    {thisMonthCount(meta.weekData) === 0 ? "오늘 시작하면 돼." : `${new Date().getMonth() + 1}월에 ${thisMonthCount(meta.weekData)}번 앉았어.`}
                  </div>
                </div>
                <div style={{ ...S.card, textAlign: "center" }}>
                  <div style={{ fontSize: 48, fontWeight: 700, color: "#F0EDE8", lineHeight: 1, padding: "8px 0" }}>
                    {Object.entries(meta.weekData).filter(([k]) => (new Date() - new Date(k)) / 864e5 < 7).reduce((s,[,v]) => s + v, 0)}
                  </div>
                  <div style={{ fontSize: 11, color: "#6B7280" }}>이번 주 블록</div>
                </div>
              </div>
            </>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
